validation:
  strategy: walk_forward
  final_holdout: true
  issue_time_framing: true
  horizon_start_h: 1
  horizon_end_h: 72

feature_policy:
  use_compact_feature_backbone: true
  allow_target_specific_routing: true
  benchmark_against_base_forecast: true
  normalize_numeric_features: true

target_routing:
  core_regression:
    - temperature
    - relative_humidity
    - dew_point
    - wind_speed
    - uv
  experimental_regression:
    - pressure
    - wind_gust
  specialized_classification:
    - rain_occurrence
  specialized_regression:
    - rain_amount
  circular:
    - wind_direction
  derived_only:
    - wind_chill
    - heat_index

models:
  baseline_regressors:
    - ridge
    - elastic_net
    - huber
    - hist_gradient_boosting
  tree_regressors:
    - random_forest
    - extra_trees
    - xgboost
    - lightgbm
    - catboost
  sequence_regressors:
    - lstm
    - gru
    - tcn
  rain_classifiers:
    - logistic_regression
    - hist_gradient_boosting_classifier
    - xgboost_classifier
    - lightgbm_classifier
    - catboost_classifier
  wind_direction_methods:
    - wrapped_residual
    - sin_cos_ridge
    - sin_cos_xgboost
    - sin_cos_catboost

selection_policy:
  keep_baseline_family_locked: true
  allow_experimental_expansion: true
  scrap_if_underperforms_base: true
  compare_by_target_and_horizon: true

v1_training_subset:
  core_residual:
    targets:
      - temperature
      - relative_humidity
      - dew_point
      - wind_speed
    models:
      - ridge
      - hist_gradient_boosting
      - lstm
  uv:
    targets:
      - uv
    models:
      - ridge
      - hist_gradient_boosting
  experimental_pressure:
    targets:
      - pressure
    models:
      - ridge
      - hist_gradient_boosting
  experimental_gust:
    targets:
      - wind_gust
    models: []
    note: "Skipped in v1 per locked decision: gust station-setup fault detection work first."
  wind_direction:
    targets:
      - wind_direction
    models:
      - sin_cos_ridge
      - sin_cos_xgboost
  rain_occurrence:
    targets:
      - rain_occurrence
    models:
      - hist_gradient_boosting_classifier
  rain_amount:
    targets:
      - rain_amount
    models:
      - hist_gradient_boosting
