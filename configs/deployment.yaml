# Deployment settings
api_host: 0.0.0.0
api_port: 8000
container_image:
  name: mozn-postprocessing
  tag: v0.1.0
  registry: null

staging_settings:
  workers: 2
  timeout_seconds: 30
  log_level: DEBUG
  cors_origins:
    - "*"

production_settings:
  workers: 4
  timeout_seconds: 30
  log_level: INFO
  cors_origins:
    - https://app.mozn.ly
  keep_alive_seconds: 5
  graceful_shutdown_seconds: 30

health_checks:
  liveness_path: /healthz
  readiness_path: /readyz
  liveness_interval_seconds: 10
  readiness_interval_seconds: 30

resource_limits:
  cpu: 2
  memory_gb: 4
  max_request_size_mb: 10
